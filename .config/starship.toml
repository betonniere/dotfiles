format = "$custom$directory[➜ \\(](white)$git_branch$git_commit$git_status[\\):](white)$character"
add_newline = false

[directory]
truncation_length = 1
truncation_symbol = "…"
format = "[$path](bold blue)"

[git_branch]
only_attached = true
format = "[$branch](yellow)"

[git_commit]
only_detached = true
format = "[$hash](red)"

[git_status]
format = "$all_status$ahead_behind"

conflicted = "[≠ ](bold red)"
ahead = "[↑${ahead_count} ](bold cyan)"
behind = "[↓${behind_count} ](bold cyan)"
diverged = "[↑${ahead_count}↓${behind_count} ](bold cyan)"
untracked = "[⚑ ](red)"
stashed = "[⬚ ](white)"
staged = "[♻ ](green)"
modified = "[♻ ](red)"
renamed = ""
deleted = "[✖ ](red)"

[character]
success_symbol = ""
error_symbol = ""

[custom.host_icon]
command = "echo $MY_HOST_ICON"
when = "true"
format = "[$output](white) "